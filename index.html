<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたの仕事スタイルはどのメンバータイプ？</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

:root{
  --bg:#f6f1e7;
  --bg2:#efe7d6;
  --ink:#3a3530;
  --sub:#6f665a;
  --line:#d8cdb8;
  --gold:#b89752;
  --t1:#c9a24a; /* 共感 */
  --t1bg:#f3ead4;
  --t2:#8a79b8; /* 知性 */
  --t2bg:#e8e1f2;
  --t3:#6fa97e; /* ムード */
  --t3bg:#dcecdf;
  --t4:#5a7da6; /* ストイック */
  --t4bg:#dde7f1;
  --t5:#c06a4e; /* 発想 */
  --t5bg:#f2ddd4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:
    radial-gradient(circle at 12% 8%, rgba(184,151,82,.10), transparent 40%),
    radial-gradient(circle at 88% 92%, rgba(138,121,184,.08), transparent 42%),
    var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:32px 16px 64px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:680px;margin:0 auto}

.sparkle{color:var(--gold);font-size:.9em;vertical-align:middle;margin:0 .35em;opacity:.8}

/* ---------- screens ---------- */
.screen{display:none;animation:fade .5s ease both}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ---------- intro ---------- */
.intro{text-align:center;padding:24px 8px}
.intro h1{
  font-family:'Shippori Mincho',serif;
  font-weight:800;
  font-size:clamp(26px,6vw,40px);
  letter-spacing:.02em;
  line-height:1.4;
  margin-bottom:18px;
}
.intro .lead{color:var(--sub);font-size:15px;line-height:1.9;margin-bottom:8px}
.intro-img{display:block;width:100%;max-width:560px;margin:22px auto 0;border-radius:18px;border:1px solid var(--line);box-shadow:0 10px 30px rgba(184,151,82,.18)}
.divider{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin:26px 0;color:var(--gold);font-size:14px;
}
.divider::before,.divider::after{
  content:"";height:1px;width:64px;
  background:linear-gradient(90deg,transparent,var(--line));
}
.divider::after{background:linear-gradient(90deg,var(--line),transparent)}
.types-preview{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:22px 0 30px;
}
.chip{
  font-family:'Shippori Mincho',serif;font-weight:600;font-size:13px;
  padding:7px 14px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.5);
}
.btn{
  font-family:'Shippori Mincho',serif;font-weight:600;
  background:linear-gradient(135deg,#c9a24a,#b89752);
  color:#fff;border:none;border-radius:999px;
  padding:15px 46px;font-size:17px;letter-spacing:.05em;
  cursor:pointer;box-shadow:0 8px 22px rgba(184,151,82,.32);
  transition:transform .15s ease,box-shadow .15s ease;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(184,151,82,.4)}
.btn:active{transform:translateY(0)}
.btn.ghost{
  background:transparent;color:var(--sub);box-shadow:none;
  border:1px solid var(--line);padding:12px 30px;font-size:14px;
}
.btn.ghost:hover{box-shadow:none;background:rgba(255,255,255,.4)}

/* ---------- progress ---------- */
.progress-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-head .qno{font-family:'Shippori Mincho',serif;font-weight:700;color:var(--gold);font-size:15px}
.progress-head .qtot{font-size:13px;color:var(--sub)}
.bar{height:6px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-bottom:30px}
.bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#c9a24a,#b89752);border-radius:999px;transition:width .4s ease}

/* ---------- question ---------- */
.qtext{
  font-family:'Shippori Mincho',serif;font-weight:700;
  font-size:clamp(19px,4.6vw,24px);line-height:1.6;margin-bottom:26px;text-align:center;
}
.opts{display:flex;flex-direction:column;gap:12px}
.opt{
  text-align:left;background:rgba(255,255,255,.62);
  border:1px solid var(--line);border-radius:16px;
  padding:17px 20px;font-size:15.5px;line-height:1.6;color:var(--ink);
  cursor:pointer;transition:all .15s ease;
  display:flex;align-items:center;gap:14px;
}
.opt:hover{border-color:var(--gold);background:#fff;transform:translateX(3px);box-shadow:0 6px 16px rgba(184,151,82,.14)}
.opt .mk{
  flex:0 0 auto;width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--line);display:grid;place-items:center;
  font-family:'Shippori Mincho',serif;font-size:13px;color:var(--sub);
}
.opt:hover .mk{border-color:var(--gold);color:var(--gold)}
.nav{display:flex;justify-content:space-between;margin-top:26px}

/* ---------- result ---------- */
.result{text-align:center}
.result .pre{color:var(--sub);font-size:14px;letter-spacing:.1em;margin-bottom:6px}
.rcard{
  border-radius:24px;padding:36px 28px;margin:10px 0 24px;
  border:1px solid var(--line);position:relative;overflow:hidden;
}
.rcard .rimg{display:block;width:150px;height:178px;object-fit:cover;border-radius:16px;margin:0 auto;border:3px solid;box-shadow:0 8px 22px rgba(58,53,48,.18)}
.rcard .num{
  font-family:'Shippori Mincho',serif;font-weight:700;color:#fff;
  width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
  margin:0 auto 14px;font-size:17px;
}
.rcard h2{font-family:'Shippori Mincho',serif;font-weight:800;font-size:clamp(24px,6vw,32px);line-height:1.35;margin-bottom:6px}
.rcard .sub{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;opacity:.85;margin-bottom:18px}
.rcard .quote{
  font-size:15px;line-height:1.9;font-style:normal;
  padding:14px 18px;border-radius:14px;background:rgba(255,255,255,.55);
  margin:0 auto 22px;max-width:440px;
}
.sec-title{
  font-family:'Shippori Mincho',serif;font-weight:700;font-size:14px;
  letter-spacing:.08em;margin-bottom:10px;display:inline-block;
  padding:3px 14px;border-radius:999px;color:#fff;
}
.feat{list-style:none;display:flex;flex-direction:column;gap:9px;max-width:430px;margin:0 auto 22px;text-align:left}
.feat li{font-size:14.5px;line-height:1.6;padding-left:24px;position:relative;color:var(--ink)}
.feat li::before{content:"✦";position:absolute;left:0;top:0;font-size:12px}
.strength{
  display:inline-flex;align-items:center;gap:10px;
  padding:11px 22px;border-radius:999px;font-size:15px;
  font-family:'Shippori Mincho',serif;font-weight:600;color:#fff;
}
.strength span{font-size:12px;background:rgba(255,255,255,.28);padding:3px 10px;border-radius:999px}

/* breakdown */
.break{max-width:430px;margin:28px auto 0;text-align:left}
.break h3{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--sub);margin-bottom:14px;text-align:center;letter-spacing:.06em}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.brow .bname{font-size:12.5px;width:130px;flex:0 0 auto;color:var(--sub)}
.brow .btrack{flex:1;height:8px;background:var(--bg2);border-radius:999px;overflow:hidden}
.brow .btrack i{display:block;height:100%;border-radius:999px;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.brow .bpct{font-size:11.5px;color:var(--sub);width:34px;text-align:right;flex:0 0 auto}

.foot{margin-top:30px;display:flex;flex-direction:column;align-items:center;gap:12px}
.tagline{
  font-family:'Shippori Mincho',serif;font-weight:600;color:var(--gold);
  font-size:15px;margin:30px 0 4px;
}
.note{font-size:11px;color:#a89c87;margin-top:24px;line-height:1.7;text-align:center}
</style>
</head>

const keys=["t1","t2","t3","t4","t5"];
let cur=0, score={t1:0,t2:0,t3:0,t4:0,t5:0}, history=[];

const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}

function start(){cur=0;score={t1:0,t2:0,t3:0,t4:0,t5:0};history=[];render();show('quiz')}

function render(){
  const item=Q[cur];
  $('qno').textContent="Q"+(cur+1);
  $('qtot').textContent="/ "+Q.length;
  $('barfill').style.width=((cur)/Q.length*100)+"%";
  $('qtext').textContent=item.q;
  const marks=["A","B","C","D","E"];
  const ho=$('opts');ho.innerHTML="";
  item.a.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="mk">'+marks[i]+'</span><span>'+o.t+'</span>';
    b.onclick=()=>choose(o.w);
    ho.appendChild(b);
  });
  $('backbtn').style.visibility = cur>0 ? 'visible':'hidden';
}

function choose(w){
  history.push(w);
  for(const k in w) score[k]+=w[k];
  cur++;
  if(cur>=Q.length){finish();}
  else{render();}
}

function back(){
  if(cur===0)return;
  cur--;
  const w=history.pop();
  for(const k in w) score[k]-=w[k];
  render();
}

function finish(){
  $('barfill').style.width="100%";
  // winner (tie -> earliest)
  let win=keys[0];
  keys.forEach(k=>{if(score[k]>score[win])win=k});
  const T=TYPES[win];
  const card=$('rcard');
  card.style.background=T.bg;
  card.style.borderColor=T.color;
  card.innerHTML=`
    <img class="rimg" src="${T.img}" alt="${T.name}" style="border-color:${T.color}">
    <div class="num" style="background:${T.color};margin-top:14px">${T.num}</div>
    <h2 style="color:${T.color}">${T.name}</h2>
    <div class="sub" style="color:${T.color}">${T.sub}</div>
    <p class="quote" style="color:var(--ink)">${T.quote}</p>
    <div class="sec-title" style="background:${T.color}">特徴</div>
    <ul class="feat">${T.feat.map(f=>`<li style="color:${T.color}"><span style="color:var(--ink)">${f}</span></li>`).join("")}</ul>
    <div class="strength" style="background:${T.color}"><span>強み</span>${T.strength}</div>
  `;
  // fix feat marker color: list marker uses li color; keep text dark
  card.querySelectorAll('.feat li').forEach(li=>{li.style.color="var(--ink)";});
  // breakdown
  const total=keys.reduce((s,k)=>s+score[k],0)||1;
  const bd=$('breakdown');bd.innerHTML="";
  // sort desc
  const sorted=[...keys].sort((a,b)=>score[b]-score[a]);
  sorted.forEach(k=>{
    const pct=Math.round(score[k]/total*100);
    const row=document.createElement('div');
    row.className='brow';
    row.innerHTML=`<span class="bname">${TYPES[k].name}</span>
      <span class="btrack"><i style="background:${TYPES[k].color}"></i></span>
      <span class="bpct">${pct}%</span>`;
    bd.appendChild(row);
    requestAnimationFrame(()=>{setTimeout(()=>{row.querySelector('i').style.width=pct+"%";},80);});
  });
  show('result');
}

function restart(){show('intro')}
</script>
</body>
</html>
